<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="{{ '/assets/images/favicon.png' | relative_url }}">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">

  <!-- 样式 -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <!-- SEO -->
  {% seo %}

  <!-- RSS -->
  {% feed_meta %}
</head>
<body>
  <div class="site-wrapper">
    <!-- 导航栏 -->
    <header class="site-header">
      <div class="container">
        <a href="{{ '/' | relative_url }}" class="site-logo">
          <span class="logo-text">{{ site.title }}</span>
        </a>
        <nav class="site-nav">
          <ul>
            <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>首页</a></li>
            <li><a href="{{ '/about' | relative_url }}" {% if page.url == '/about/' or page.url == '/about.html' %}class="active"{% endif %}>关于我</a></li>
            <li><a href="{{ '/archive' | relative_url }}" {% if page.url == '/archive/' or page.url == '/archive.html' %}class="active"{% endif %}>归档</a></li>
          </ul>
        </nav>
        <button class="nav-toggle" aria-label="Toggle navigation">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </header>

    <!-- 主内容 -->
    <main class="site-main">
      {{ content }}
    </main>

    <!-- 页脚 -->
    <footer class="site-footer">
      <div class="container">
        <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}. All rights reserved.</p>
        <p class="powered-by">Powered by <a href="https://jekyllrb.com" target="_blank">Jekyll</a> & <a href="https://pages.github.com" target="_blank">GitHub Pages</a></p>
        <p class="icp-beian"><a href="https://beian.miit.gov.cn/" target="_blank" rel="nofollow">粤ICP备18152027号</a></p>
      </div>
    </footer>
  </div>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
